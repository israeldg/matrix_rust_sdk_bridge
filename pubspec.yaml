name: matrix_rust_sdk_bridge
description: "A new Flutter FFI plugin project."
version: 0.0.1
publish_to: 'none'
# homepage:

environment:
  sdk: ^3.8.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.11.1
  plugin_platform_interface: ^2.0.2

  # Functional programming
  fpdart: ^1.1.1
  
  # okra_matrix dependencies eventually okra matrix would be only widgets  
  equatable: ^2.0.7  
  flutter_bloc: ^9.1.1
  path_provider: ^2.1.5

  # to be removed because this library must be complete detached to  front end  
  timeago: ^3.7.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  image_picker: ^1.1.2
  ###intl: ^0.20.2
  ###  image_picker: ^1.1.2
 
 # okra_core dependencies
  okra_core:
      path: ../okra_core/  
  freezed_annotation: ^3.1.0



dev_dependencies:  
  ffi: ^2.1.3
  ffigen: ^13.0.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter      
  freezed: ^3.2.3
  build_runner: ^2.10.2





